[project]
name = "narratological-mcp"
version = "0.1.0"
description = "MCP server for Narratological Algorithmic Lenses"
dependencies = [
    "fastmcp>=0.4.1",
    "narratological",
]

[project.scripts]
narratological-mcp = "narratological_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/narratological_mcp"]
